name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show tool versions
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: Install icon generation dependencies
        run: |
          set -euo pipefail
          brew install librsvg pillow

      - name: Run tests
        run: swift test

      - name: Package release artifacts
        run: |
          set -euo pipefail
          Scripts/package-release.sh --output-dir dist

      - name: Build Changelog
        run: |
          set -euo pipefail
          Scripts/build-changelogs.sh ${{ github.ref_name }}

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          test -d dist/StayHere.app
          test -f dist/StayHere.zip
          test -f dist/StayHere.dmg
          test -f dist/StayHere.zip.sha256
          test -f dist/StayHere.dmg.sha256
          test -f dist/release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/StayHere.zip
            dist/StayHere.dmg
            dist/StayHere.zip.sha256
            dist/StayHere.dmg.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
