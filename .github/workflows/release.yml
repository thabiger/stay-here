name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build, Notarize, and Publish
    runs-on: macos-14

    env:
      APP_NAME: StayHere
      TARGET_NAME: StayHereApp
      BUNDLE_ID: com.tha.stayhere
      OUTPUT_DIR: dist
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Validate release secrets
        run: |
          set -euo pipefail

          required_vars=(
            APPLE_ID
            APPLE_TEAM_ID
            APPLE_APP_SPECIFIC_PASSWORD
            DEVELOPER_ID_CERTIFICATE_BASE64
            DEVELOPER_ID_CERTIFICATE_PASSWORD
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "::error::Missing required secret: $var_name"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/stayhere-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id.p12"

          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application:/ {print $2; exit}')"
          if [[ -z "$identity" ]]; then
            echo "::error::Could not find a Developer ID Application signing identity"
            exit 1
          fi

          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Build signed app bundle
        run: |
          set -euo pipefail
          Scripts/build-release-app.sh \
            --output-dir "$OUTPUT_DIR" \
            --identity "$CODESIGN_IDENTITY"

      - name: Notarize and staple app bundle
        run: |
          set -euo pipefail

          app_bundle="$OUTPUT_DIR/$APP_NAME.app"
          temp_zip="$RUNNER_TEMP/$APP_NAME-notarize.zip"

          ditto -c -k --keepParent "$app_bundle" "$temp_zip"
          xcrun notarytool submit "$temp_zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$app_bundle"
          xcrun stapler validate "$app_bundle"
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          spctl --assess --type execute --verbose=4 "$app_bundle"

      - name: Package release artifacts
        run: |
          set -euo pipefail

          app_bundle="$OUTPUT_DIR/$APP_NAME.app"
          zip_path="$OUTPUT_DIR/$APP_NAME.zip"
          dmg_path="$OUTPUT_DIR/$APP_NAME.dmg"

          rm -f "$zip_path" "$dmg_path" "$zip_path.sha256" "$dmg_path.sha256"

          ditto -c -k --keepParent "$app_bundle" "$zip_path"

          temp_dmg="$RUNNER_TEMP/$APP_NAME.dmg"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$app_bundle" \
            -ov \
            -format UDZO \
            "$temp_dmg"
          mv "$temp_dmg" "$dmg_path"

      - name: Notarize and staple DMG
        run: |
          set -euo pipefail

          dmg_path="$OUTPUT_DIR/$APP_NAME.dmg"
          xcrun notarytool submit "$dmg_path" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          hdiutil verify "$dmg_path"
          spctl --assess --type open --verbose=4 "$dmg_path"

      - name: Generate checksums
        run: |
          set -euo pipefail

          checksum_file() {
            local artifact_path="$1"
            local checksum_path="$2"
            local checksum_value

            if command -v shasum >/dev/null 2>&1; then
              checksum_value="$(shasum -a 256 "$artifact_path" | awk '{print $1}')"
            else
              checksum_value="$(sha256sum "$artifact_path" | awk '{print $1}')"
            fi

            printf '%s  %s\n' "$checksum_value" "$(basename "$artifact_path")" > "$checksum_path"
          }

          checksum_file "$OUTPUT_DIR/$APP_NAME.zip" "$OUTPUT_DIR/$APP_NAME.zip.sha256"
          checksum_file "$OUTPUT_DIR/$APP_NAME.dmg" "$OUTPUT_DIR/$APP_NAME.dmg.sha256"

      - name: Prepare release notes
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          lines = Path("CHANGELOG.md").read_text().splitlines()
          body = []
          capture = False

          for line in lines:
              if line.startswith("## "):
                  if capture:
                      break
                  capture = True
                  continue
              if capture:
                  body.append(line)

          notes = "\n".join(body).strip()
          if not notes:
              raise SystemExit("No release notes found in CHANGELOG.md")

          Path("dist/release-notes.md").write_text(notes + "\n")
          PY

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          test -d "$OUTPUT_DIR/$APP_NAME.app"
          test -f "$OUTPUT_DIR/$APP_NAME.zip"
          test -f "$OUTPUT_DIR/$APP_NAME.dmg"
          test -f "$OUTPUT_DIR/$APP_NAME.zip.sha256"
          test -f "$OUTPUT_DIR/$APP_NAME.dmg.sha256"
          test -f "$OUTPUT_DIR/release-notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/StayHere.zip
            dist/StayHere.dmg
            dist/StayHere.zip.sha256
            dist/StayHere.dmg.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
